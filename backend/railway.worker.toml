# Railway configuration for the BullMQ Worker service
# In Railway dashboard: set Root Directory = "backend", Dockerfile Path = "Dockerfile.worker"

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.worker"

[deploy]
startCommand = "node src/worker.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
# No healthcheckPath — worker has no HTTP port
