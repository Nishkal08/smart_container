<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#f36c1a"/>
  <!-- Crane arm left -->
  <circle cx="9" cy="7" r="2" fill="white" opacity="0.9"/>
  <!-- Crane arm right -->
  <circle cx="23" cy="7" r="2" fill="white" opacity="0.9"/>
  <!-- Crane connectors -->
  <line x1="9" y1="9" x2="9" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="23" y1="9" x2="23" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Container body -->
  <rect x="5" y="12" width="22" height="14" rx="2" fill="white" opacity="0.95"/>
  <!-- Door divider left -->
  <line x1="12" y1="12" x2="12" y2="26" stroke="#f36c1a" stroke-width="1.5"/>
  <!-- Door divider right -->
  <line x1="19" y1="12" x2="19" y2="26" stroke="#f36c1a" stroke-width="1.5"/>
  <!-- Horizontal rib -->
  <line x1="5" y1="19" x2="27" y2="19" stroke="#f36c1a" stroke-width="1.2"/>
</svg>
