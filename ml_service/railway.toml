# Railway configuration for the FastAPI ML Service
# In Railway dashboard: set Root Directory = "ml_service"

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# ML service is internal-only; do NOT expose a public domain in Railway
